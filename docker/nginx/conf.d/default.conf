server {
    # HTTP listener for browser requests on port 80
    listen 80;

    # Document root inside the container 
    root /var/www/html/public;

    # Default file when a directory is requested
    index index.php;

    location / {
        # Try static file, then directory, otherwise pass to index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;

        # Default script name for directory-style requests
        fastcgi_index index.php;

        # Absolute path to the PHP script that FPM should execute
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Standard FastCGI params
        include fastcgi_params;
    }
}