version: '3.8'

services:

  web:
    image: nginx:alpine
    container_name: camagru_nginx
    ports:
      - "8080:80" # Map computer port 8080 to the container's 80
    volumes:
      - ./app:/var/www/html # Map app directory to nginx html directory for Hot Reloading
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf # Custom nginx config
    depends_on:
      - app
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: camagru_php
  db:
    image: postgres:15-alpine
    container_name: camagru_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: # users don't vanish when container is removed